version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  # Note: Database is hosted on Render.com — no local db container needed
